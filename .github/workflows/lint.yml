name: Lint

on:
  push:
  pull_request:

jobs:
  ruff:
    name: Ruff
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run Ruff lint
        uses: astral-sh/ruff-action@v3
        with:
          args: check

      - name: Run Ruff format check
        uses: astral-sh/ruff-action@v3
        with:
          args: format --check